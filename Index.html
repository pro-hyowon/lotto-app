<head>

<title>로또 6/45 통계 분석</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#eef2f7;color:#1a2233;min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:20px}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#2563a8 60%,#1a4f8a 100%);border-radius:16px;padding:24px;margin-bottom:20px}
.header h1{font-size:24px;font-weight:700;color:#ffd700;letter-spacing:-0.5px;margin-bottom:4px}
.header .sub{font-size:14px;color:#c8dff5;font-weight:500}
.latest-box{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);border-radius:12px;padding:16px;margin-top:16px}
.latest-round{font-size:13px;color:#ffd700;font-weight:700;margin-bottom:8px}
.balls-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ball{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;font-weight:700;font-size:15px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.ball-sm{width:32px;height:32px;font-size:13px}
.bonus-sep{color:#4a5f7a;font-size:20px;font-weight:400}
.tabs{display:flex;gap:4px;background:#d5e0ee;border-radius:12px;padding:4px;margin-bottom:20px;border:1px solid #bccde0}
.tab{flex:1;padding:11px 8px;border:none;background:none;color:#2d4060;cursor:pointer;border-radius:8px;font-size:14px;font-weight:600;transition:all 0.2s;font-family:inherit}
.tab.active{background:#1e3a5f;color:#ffd700}
.tab:hover:not(.active){background:rgba(30,58,95,0.1);color:#1e3a5f}
.section{display:none}
.section.active{display:block}
.rec-card{background:#ffffff;border:1px solid #c8d8ec;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(30,58,95,0.08)}
.rec-card:hover{border-color:#2563a8}
.rec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.rec-score{font-size:14px;color:#c47f00;font-weight:700}
.score-bar-bg{height:4px;background:#dde9f5;border-radius:2px;margin-top:10px}
.score-bar-fill{height:4px;background:linear-gradient(90deg,#f5a800,#e06c00);border-radius:2px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#ffffff;border:1px solid #c8d8ec;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(30,58,95,0.07)}
.stat-label{font-size:12px;color:#3d5272;font-weight:600;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:700;color:#1e3a5f}
.stat-sub{font-size:12px;color:#4a5f7a;margin-top:3px}
.freq-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.freq-num{width:26px;text-align:right;font-size:12px;font-weight:700}
.freq-bar-bg{flex:1;height:18px;background:#e8f0f8;border-radius:4px;overflow:hidden}
.freq-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:700;color:rgba(0,0,0,0.75)}
.freq-count{width:34px;font-size:12px;color:#2d4060;font-weight:600;text-align:right}

.factor-pct{font-size:12px;color:#3d5272;font-weight:600;margin-top:5px}

.history-scroll{max-height:500px;overflow-y:auto;border:1px solid #c8d8ec;border-radius:12px;background:#fff}
.btn{background:#1e3a5f;color:#ffd700;border:none;padding:11px 22px;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;transition:all 0.2s;font-family:inherit}
.btn:hover{background:#2a4f7a;transform:translateY(-1px)}
.btn:active{transform:scale(0.97)}
.btn-outline{background:#fff;color:#1e3a5f;border:2px solid #1e3a5f;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:all 0.2s;font-family:inherit}
.btn-outline:hover{background:#eaf1f8}
.section-title{font-size:17px;font-weight:700;color:#1a2233;margin-bottom:14px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}

.loading{text-align:center;padding:40px;color:#3d5272;font-size:14px;font-weight:500}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid #c8d8ec;border-top-color:#2563a8;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.zone-vis{display:flex;gap:6px;margin:8px 0}
.zone{flex:1;text-align:center;padding:10px 6px;border-radius:8px;background:#eaf1f8;border:1px solid #c8d8ec}
.zone-label{font-size:11px;color:#2d4060;font-weight:600;margin-bottom:4px}
.zone-pct{font-size:15px;font-weight:700;color:#1e3a5f}

.fetch-status.error{color:#b71c1c}

function buildStats(data){
  const N=data.length;
  const freq=new Array(46).fill(0);
  const recentFreq=new Array(46).fill(0);
  const RECENT=50;
  const coAppear=Array.from({length:46},()=>new Array(46).fill(0));
  const sums=[],oddCounts=[],lowCounts=[],acVals=[];
  
  data.forEach((d,idx)=>{
    d.nums.forEach(n=>freq[n]++);
    if(idx>=N-RECENT) d.nums.forEach(n=>recentFreq[n]++);
    for(let i=0;i<6;i++) for(let j=i+1;j<6;j++){
      const a=Math.min(d.nums[i],d.nums[j]),b=Math.max(d.nums[i],d.nums[j]);
      coAppear[a][b]++;
    }
    const s=d.nums.reduce((a,b)=>a+b,0);
    sums.push(s);
    oddCounts.push(d.nums.filter(n=>n%2===1).length);
    lowCounts.push(d.nums.filter(n=>n<=22).length);
    const sorted=[...d.nums].sort((a,b)=>a-b);
    const diffs=new Set();
    for(let i=0;i<6;i++) for(let j=i+1;j<6;j++) diffs.add(sorted[j]-sorted[i]);
    acVals.push(diffs.size-5);
  });
  
  const sumMean=sums.reduce((a,b)=>a+b,0)/N;
  const sumStd=Math.sqrt(sums.reduce((a,b)=>a+(b-sumMean)**2,0)/N);
  
  const oddEvenDist=new Array(7).fill(0);
  oddCounts.forEach(c=>oddEvenDist[c]++);
  for(let i=0;i<7;i++) oddEvenDist[i]/=N;
  
  const lowHighDist=new Array(7).fill(0);
  lowCounts.forEach(c=>lowHighDist[c]++);
  for(let i=0;i<7;i++) lowHighDist[i]/=N;
  
  const acDist=new Array(16).fill(0);
  acVals.forEach(v=>{if(v>=0&&v<16)acDist[v]++;});
  for(let i=0;i<16;i++) acDist[i]/=N;

  // 각 번호의 마지막 출현 후 경과 회차 (gap)
  const gapMap=new Array(46).fill(50);
  for(let n=1;n<=45;n++){
    for(let i=data.length-1;i>=0;i--){
      if(data[i].nums.includes(n)){
        gapMap[n]=data.length-1-i;
        break;
      }
    }
  }

  return{freq,recentFreq,coAppear,sums,sumMean,sumStd,oddEvenDist,lowHighDist,acDist,N,gapMap,lastDraw:data[data.length-1]?data[data.length-1].nums:[]};
}

// === 패턴 분석 헬퍼 ===
function ac_value(nums){
  const s=[...nums].sort((a,b)=>a-b);
  const diffs=new Set();
  for(let i=0;i<6;i++) for(let j=i+1;j<6;j++) diffs.add(s[j]-s[i]);
  return diffs.size-5;
}
function cons_pairs(nums){
  const s=[...nums].sort((a,b)=>a-b);
  let c=0;
  for(let i=1;i<6;i++) if(s[i]-s[i-1]===1) c++;
  return c;
}
function zone_count(nums){
  return new Set(nums.map(n=>n<=9?1:n<=18?2:n<=27?3:n<=36?4:5)).size;
}

// === 다양성을 위한 5가지 추천 전략 ===
function scoreSet(nums,st,strategy){
  const s=[...nums].sort((a,b)=>a-b);
  let score=0;
  const maxF=Math.max(...st.freq.slice(1));
  const minF=Math.min(...st.freq.slice(1));
  const maxR=Math.max(...st.recentFreq.slice(1));
  const minR=Math.min(...st.recentFreq.slice(1));

  // 기본: 개별 확률 (15%)
  let indiv=0;
  for(const n of s){
    const fsc=(st.freq[n]-minF)/(maxF-minF||1);
    const rsc=(st.recentFreq[n]-minR)/(maxR-minR||1);
    indiv+=0.4*fsc+0.6*rsc;
  }
  score+=15*(indiv/6);

  // 동반출현 (15%) — 비중 축소
  let pairTotal=0,maxPair=0;
  for(let a=1;a<=45;a++) for(let b=a+1;b<=45;b++) maxPair=Math.max(maxPair,st.coAppear[a][b]);
  for(let i=0;i<6;i++) for(let j=i+1;j<6;j++){
    const a=Math.min(s[i],s[j]),b=Math.max(s[i],s[j]);
    pairTotal+=st.coAppear[a][b];
  }
  score+=15*Math.min(pairTotal/(maxPair*15*0.22),1);

  // 합계 정상 범위 (10%) — 100~180
  const sum=s.reduce((a,b)=>a+b,0);
  score+=10*(sum>=100&&sum<=180?1:0.3);

  // AC값 정상 범위 (10%) — 6~10 모두 허용 (1225는 6이었음)
  const ac=ac_value(s);
  score+=10*(ac>=6?1:ac>=4?0.6:0.2);

  // 5구간 적정 분산 (8%) — 3구간 이상 OK
  const zc=zone_count(s);
  score+=8*(zc>=3?1:0.4);

  // 홀짝 균형 (7%) — 1~5 모두 허용
  const odd=s.filter(n=>n%2===1).length;
  score+=7*(odd>=1&&odd<=5?1:0.3);

  // 직전회차 미출현 보너스 (5%) — 연속 회차 분석
  if(st.lastDraw){
    const overlap=s.filter(n=>st.lastDraw.includes(n)).length;
    score+=5*(overlap<=2?1:overlap===3?0.5:0.2);
  } else score+=5;

  // === 전략별 추가 점수 (30%) ===
  if(strategy==='balance'){
    // 균형형: 핫번호 5+ 개, AC 8+, 표준 패턴
    const hot=s.filter(n=>st.recentFreq[n]>=3).length;
    score+=15*(hot>=4?1:hot>=3?0.7:0.4);
    score+=15*(ac>=8?1:ac>=7?0.7:0.4);
  } else if(strategy==='hot'){
    // 핫형: 최근 50회 출현 빈도 극대화
    const hotScore=s.reduce((a,n)=>a+st.recentFreq[n],0);
    const maxHotScore=6*maxR;
    score+=30*(hotScore/maxHotScore);
  } else if(strategy==='gap'){
    // 간격형: 다양한 미출현 간격 조합 (1225 패턴)
    const gaps=s.map(n=>st.gapMap[n]||50);
    const avgGap=gaps.reduce((a,b)=>a+b,0)/6;
    score+=15*(avgGap>=4&&avgGap<=10?1:0.4);
    // 연속번호 1~2쌍 허용 (1225는 2쌍이었음)
    const cp=cons_pairs(s);
    score+=15*(cp===1?1:cp===2?0.85:cp===0?0.7:0.3);
  } else if(strategy==='wildcard'){
    // 와일드카드형: 콜드+핫 혼합으로 우연 패턴 노림
    const hot=s.filter(n=>st.recentFreq[n]>=3).length;
    const cold=s.filter(n=>st.recentFreq[n]<=1).length;
    score+=15*(hot>=2&&hot<=4?1:0.5);
    score+=15*(cold>=1&&cold<=3?1:0.4);
  } else if(strategy==='pattern'){
    // 패턴형: 끝수 분포, 합계 중앙값, 다양성 종합
    const lastDigits=new Set(s.map(n=>n%10));
    score+=15*(lastDigits.size>=4?1:lastDigits.size/4);
    const range=Math.max(...s)-Math.min(...s);
    score+=15*(range>=25&&range<=40?1:0.4);
  }

  return Math.round(score*10)/10;
}

function generateRecs(st,n=5){
  const maxF=Math.max(...st.freq.slice(1));
  const minF=Math.min(...st.freq.slice(1));
  const maxR=Math.max(...st.recentFreq.slice(1));
  const minR=Math.min(...st.recentFreq.slice(1));

  // 각 번호의 종합 선택 점수
  const sel=new Array(46).fill(0);
  for(let i=1;i<=45;i++){
    const fsc=(st.freq[i]-minF)/(maxF-minF||1);
    const rsc=(st.recentFreq[i]-minR)/(maxR-minR||1);
    sel[i]=0.35*fsc+0.65*rsc+0.15; // 모든 번호에 기본 가중치 +0.15
  }

  const ranked=[...Array(45)].map((_,i)=>({num:i+1,sc:sel[i+1]})).sort((a,b)=>b.sc-a.sc);

  function sample(pool, weights){
    const rem=[...pool],rp=weights?[...weights]:pool.map(n=>sel[n]),out=[];
    for(let p=0;p<6;p++){
      const pt=rp.reduce((a,b)=>a+b,0);
      let r=Math.random()*pt,idx=0;
      while(idx<rem.length-1){r-=rp[idx];if(r<=0)break;idx++;}
      out.push(rem[idx]);rem.splice(idx,1);rp.splice(idx,1);
    }
    return out;
  }

  // 다양한 풀 정의
  const top18=ranked.slice(0,18).map(x=>x.num); // 균형형
  const top12=ranked.slice(0,12).map(x=>x.num); // 핫형
  const top25=ranked.slice(0,25).map(x=>x.num); // 패턴형
  const mid=ranked.slice(8,28).map(x=>x.num); // 간격형
  const all45=[...Array(45)].map((_,i)=>i+1); // 와일드카드형

  const strategies=[
    {name:'균형형',pool:top18,weight:'normal',desc:'핫번호+표준패턴',icon:'⚖️'},
    {name:'집중형',pool:top12,weight:'strong',desc:'최고확률 번호 집중',icon:'🎯'},
    {name:'간격형',pool:[...top18,...mid.filter(n=>!top18.includes(n)).slice(0,5)],weight:'normal',desc:'미출현 간격 조합',icon:'⏱️'},
    {name:'와일드형',pool:all45,weight:'mixed',desc:'핫+콜드 혼합',icon:'🎲'},
    {name:'패턴형',pool:top25,weight:'normal',desc:'끝수·범위 다양성',icon:'🔀'},
  ];
  const stratKeys=['balance','hot','gap','wildcard','pattern'];

  const result=[];

  strategies.forEach((strat,si)=>{
    const candidates=[];
    const N=3000;
    for(let t=0;t<N;t++){
      let nums;
      if(strat.weight==='mixed'){
        const hot=sample(top18.slice());
        const hotPicked=hot.slice(0,4);
        const remaining=all45.filter(n=>!hotPicked.includes(n));
        const cold=sample(remaining);
        nums=[...hotPicked,...cold.slice(0,2)];
      } else if(strat.weight==='strong'){
        const main=sample(strat.pool.slice());
        const mainPicked=main.slice(0,5);
        const remaining=top18.filter(n=>!mainPicked.includes(n));
        if(remaining.length>0){
          const extra=sample(remaining);
          nums=[...mainPicked,extra[0]];
        } else nums=main;
      } else {
        nums=sample(strat.pool.slice());
      }
      nums=nums.sort((a,b)=>a-b);
      candidates.push({nums,score:scoreSet(nums,st,stratKeys[si]),strategy:strat.name,icon:strat.icon,desc:strat.desc});
    }
    candidates.sort((a,b)=>b.score-a.score);
    // 다양성 확보: 이전 추천과 겹치는 번호 최대 3개까지만 허용
    let picked=null;
    for(const c of candidates){
      let maxOverlap=0;
      for(const r of result){
        const overlap=c.nums.filter(n=>r.nums.includes(n)).length;
        if(overlap>maxOverlap) maxOverlap=overlap;
      }
      if(maxOverlap<=3){picked=c;break;}
    }
    result.push(picked||candidates[0]);
  });

  // 부가 정보
  result.forEach(r=>{
    let ps=0;
    for(let i=0;i<6;i++) for(let j=i+1;j<6;j++){
      const a=Math.min(r.nums[i],r.nums[j]),b=Math.max(r.nums[i],r.nums[j]);
      ps+=st.coAppear[a][b];
    }
    r.pairScore=ps;
    r.hotCount=r.nums.filter(n=>st.recentFreq[n]>=3).length;
    r.acValue=ac_value(r.nums);
    r.consPairs=cons_pairs(r.nums);
    r.zoneCount=zone_count(r.nums);
    r.topRanks=r.nums.map(n=>ranked.findIndex(x=>x.num===n)+1);
  });
  return result;
}

function applyManual(){
  const round=parseInt(document.getElementById('m-round').value);
  const nums=[1,2,3,4,5,6].map(i=>parseInt(document.getElementById('m-n'+i).value));
  const bonus=parseInt(document.getElementById('m-bonus').value);
  const resultEl=document.getElementById('manual-result');

  // 유효성 검사
  if(!round||nums.some(isNaN)||isNaN(bonus)){
    resultEl.innerHTML='<div style="color:#b71c1c;background:#fdecea;padding:10px;border-radius:8px;font-weight:700">⚠️ 모든 칸을 채워주세요.</div>';
    return;
  }
  if(nums.some(n=>n<1||n>45)||bonus<1||bonus>45){
    resultEl.innerHTML='<div style="color:#b71c1c;background:#fdecea;padding:10px;border-radius:8px;font-weight:700">⚠️ 번호는 1~45 사이여야 합니다.</div>';
    return;
  }
  const unique=new Set(nums);
  if(unique.size!==6){
    resultEl.innerHTML='<div style="color:#b71c1c;background:#fdecea;padding:10px;border-radius:8px;font-weight:700">⚠️ 6개 번호는 모두 달라야 합니다.</div>';
    return;
  }
  if(allData.find(d=>d.round===round)){
    resultEl.innerHTML=`<div style="color:#b71c1c;background:#fdecea;padding:10px;border-radius:8px;font-weight:700">⚠️ ${round}회는 이미 등록된 데이터입니다.</div>`;
    return;
  }

  // 데이터 추가 및 전체 재계산
  const sorted=nums.sort((a,b)=>a-b);
  allData.push({round,nums:sorted,bonus});
  allData.sort((a,b)=>a.round-b.round);
  appStats=buildStats(allData);
  recs=generateRecs(appStats);

  // 다음 회차로 입력 칸 업데이트
  document.getElementById('m-round').value=round+1;
  [1,2,3,4,5,6].forEach(i=>{document.getElementById('m-n'+i).value='';});
  document.getElementById('m-bonus').value='';

  // 모든 탭 갱신
  renderLatest();
  renderRecommend();
  renderStats();
  renderNumbers();
  renderHistory();

  resultEl.innerHTML=`
    <div style="color:#1b5e20;background:#e8f5e9;padding:12px;border-radius:8px;font-weight:700;font-size:14px">
      ✅ ${round}회 등록 완료! 번호: ${sorted.join(', ')} + 보너스 ${bonus}
      <div style="font-size:12px;font-weight:600;margin-top:4px;color:#2e7d32">통계 분석 및 번호 추천이 업데이트되었습니다.</div>
    </div>
  `;
}

function init(){
  appStats=buildStats(allData);
  recs=generateRecs(appStats);
  renderLatest();
  renderRecommend();
  renderStats();
  renderNumbers();
  renderHistory();
}

init();

</script>
</body>
</html>
